<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agri Cluster GPA Marks Calculator</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #2ecc71;
            --secondary: #3498db;
            --accent: #e74c3c;
            --background: #f5f6fa;
            --card-bg: rgba(255, 255, 255, 0.95);
            --text: #2c3e50;
            --shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            --transition: all 0.3s ease;
            --dark-bg: #000000;
            --dark-card: #1a1a1a;
            --dark-text: #e0e0e0;
            --dark-border: #333333;
            --error: #e74c3c;
            --success: #2ecc71;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135

deg, var(--background), #dfe4ea);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
            transition: var(--transition);
        }

        body.dark-mode {
            background: var(--dark-bg);
            color: var(--dark-text);
        }

        .container {
            max-width: 600px;
            width: 100%;
            padding: 2rem;
            background: var(--card-bg);
            border-radius: 20px;
            box-shadow: var(--shadow);
            backdrop-filter: blur(12px);
            animation: slideIn 0.5s ease;
            text-align: center;
        }

        body.dark-mode .container {
            background: var(--dark-card);
        }

        @keyframes slideIn {
            from { transform: translateY(50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        h1 {
            color: var(--primary);
            font-size: 2.5rem;
            margin-bottom: 1.5rem;
 طبقة النص: 2px 2px 4px rgba(0, 0, 0, 0.1);
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: 1px;
            font-weight: 700;
        }

        .instructions {
            color: #7f8c8d;
            font-weight: 400;
            margin-bottom: 1.5rem;
            font-size: 1.1rem;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 15px;
            box-shadow: inset 0 2px 5px rgba(0, 0, 0, 0.05);
            max-width: 80%;
            margin-left: auto;
            margin-right: auto;
        }

        body.dark-mode .instructions {
            color: #b0b3b8;
            background: rgba(52, 73, 94, 0.8);
        }

        .instructions span {
            color: var(--primary);
            font-weight: 600;
        }

        .input-group {
            margin-bottom: 1.2rem;
            position: relative;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text);
            font-weight: 600;
        }

        body.dark-mode label {
            color: var(--dark-text);
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #ecf0f1;
            border-radius: 10px;
            font-size: 1rem;
            transition: var(--transition);
            background: rgba(245, 245, 247, 0.7);
        }

        body.dark-mode input {
            background: #333;
            border-color: var(--dark-border);
            color: var(--dark-text);
        }

        input:focus {
            border-color: var(--primary);
            outline: none;
            box-shadow: 0 0 5px rgba(46, 204, 113, 0.3);
        }

        input.valid {
            border-color: var(--success);
        }

        input.invalid {
            border-color: var(--error);
        }

        .error-message {
            color: var(--error);
            font-size: 0.8rem;
            position: absolute;
            bottom: -20px;
            left: 0;
            width: 100%;
            text-align: left;
        }

        .button-group {
            display: flex;
            gap: 1rem;
            margin-top: 1.5rem;
            flex-wrap: wrap;
            justify-content: center;
        }

        button {
            padding: 16px 24px;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            min-width: 150px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.15);
            position: relative;
            overflow: hidden;
            color: white;
        }

        button::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s ease, height 0.6s ease;
        }

        button:hover::after {
            width: 300px;
            height: 300px;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.2);
        }

        .calc-btn {
            background: linear-gradient(45deg, var(--primary), #27ae60);
        }

        .switch-btn {
            background: linear-gradient(45deg, var(--secondary), #2980b9);
        }

        .reset-btn {
            background: linear-gradient(45deg, var(--accent), #c0392b);
        }

        .theme-btn {
            background: linear-gradient(45deg, #8e44ad, #732d91);
        }

        .export-btn {
            background: linear-gradient(45deg, #f1c40f, #e67e22);
        }

        .share-btn {
            background: linear-gradient(45deg, #1abc9c, #16a085);
        }

        .save-btn {
            background: linear-gradient(45deg, #ff6b6b, #ee5253);
        }

        .view-saved-btn {
            background: linear-gradient(45deg, #6c5ce7, #a29bfe);
        }

        .result-box {
            margin-top: 1.5rem;
            padding: 1rem 1.5rem;
            border-radius: 12px;
            background: #f8f9fb;
            color: var(--text);
            font-weight: 700;
            font-size: 1.3rem;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1), inset 0 1px 3px rgba(255, 255, 255, 0.8);
            border: 1px solid #e1e4e8;
            max-width: 80%;
            margin-left: auto;
            margin-right: auto;
            position: relative;
            overflow: hidden;
            animation: fadeIn 0.5s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
            flex-direction: column;
        }

        body.dark-mode .result-box {
            background: var(--dark-card);
            border-color: var(--dark-border);
            color: var(--dark-text);
        }

        .result-box::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(120deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            animation: shimmer 2s infinite;
        }

        .result-box span {
            color: var(--primary);
            font-weight: 800;
            font-size: 1.8rem;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.2);
        }

        .summary {
            font-size: 0.9rem;
            color: #7f8c8d;
            margin-top: 0.5rem;
        }

        body.dark-mode .summary {
            color: #b0b3b8;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        .history {
            margin-top: 2rem;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.05);
            border-radius: 10px;
            max-height: 200px;
            overflow-y: auto;
        }

        body.dark-mode .history {
            background: rgba(255, 255, 255, 0.05);
        }

        .history h4 {
            color: var(--text);
        }

        body.dark-mode .history h4 {
            color: var(--dark-text);
        }

        .history p {
            color: var(--text);
        }

        body.dark-mode .history p {
            color: var(--dark-text);
        }

        @media (max-width: 480px) {
            .container { padding: 1.5rem; }
            h1 { font-size: 2rem; }
            .instructions { font-size: 0.9rem; padding: 0.8rem; }
            button { padding: 14px 20px; font-size: 1rem; min-width: 130px; }
            .result-box { font-size: 1.1rem; padding: 0.8rem 1.2rem; }
            .result-box span { font-size: 1.5rem; }
            .button-group { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="container" id="page1">
        <h1>Agri Cluster GPA Marks Calculator</h1>
        <div class="instructions">
            If your <span>Career and Physical Education</span> marks are less than 150, Enter the actual value, Otherwise skip
        </div>
        
        <div class="input-group">
            <label>SSC Total Marks (Out of 1300):</label>
            <input type="number" id="sscTotal1" placeholder="Enter total marks" oninput="validateInput(this, 1300)">
            <div class="error-message" id="sscTotal1-error"></div>
        </div>
        <div class="input-group">
            <label>SSC 4th Subject Marks (Out of 100):</label>
            <input type="number" id="ssc4th1" placeholder="Enter 4th subject marks" oninput="validateInput(this, 100)">
            <div class="error-message" id="ssc4th1-error"></div>
        </div>
        <div class="input-group">
            <label>Career and Physical Education Marks:</label>
            <input type="number" id="cpeMarks1" placeholder="Default: 150" oninput="validateInput(this, 150)">
            <div class="error-message" id="cpeMarks1-error"></div>
        </div>
        <div class="input-group">
            <label>HSC Total Marks (Out of 1300):</label>
            <input type="number" id="hscTotal1" placeholder="Enter total marks" oninput="validateInput(this, 1300)">
            <div class="error-message" id="hscTotal1-error"></div>
        </div>
        <div class="input-group">
            <label>HSC 4th Subject Marks (Out of 200):</label>
            <input type="number" id="hsc4th1" placeholder="Enter 4th subject marks" oninput="validateInput(this, 200)">
            <div class="error-message" id="hsc4th1-error"></div>
        </div>

        <div class="button-group">
            <button class="calc-btn" onclick="calculateGPA1()">Calculate Marks</button>
            <button class="switch-btn" onclick="switchPage()">Switch to Alternate</button>
            <button class="reset-btn" onclick="resetForm('page1')">Reset</button>
            <button class="theme-btn" onclick="toggleTheme()">Dark Mode</button>
            <button class="export-btn" onclick="exportHistory('history1')">Export History</button>
            <button class="share-btn" onclick="shareResult('result1')">Share Result</button>
            <button class="save-btn" onclick="saveCalculation('page1')">Save Calculation</button>
            <button class="view-saved-btn" onclick="viewSavedCalculations()">View Saved</button>
        </div>
        <div class="result-box" id="result1"></div>
        <div class="history" id="history1"></div>
    </div>

    <div class="container" id="page2" style="display: none;">
        <h1>Alternate GPA Marks Calculator</h1>
        <div class="instructions">
            Enter <span>SSC marks</span> excluding 4th subject, Career and Physical Education<br>
            Enter <span>HSC marks</span> excluding 4th subject
        </div>
        
        <div class="input-group">
            <label>SSC Marks (Out of 1050):</label>
            <input type="number" id="sscTotal2" placeholder="Enter core marks" oninput="validateInput(this, 1050)">
            <div class="error-message" id="sscTotal2-error"></div>
        </div>
        <div class="input-group">
            <label>HSC Marks (Out of 1100):</label>
            <input type="number" id="hscTotal2" placeholder="Enter core marks" oninput="validateInput(this, 1100)">
            <div class="error-message" id="hscTotal2-error"></div>
        </div>

        <div class="button-group">
            <button class="calc-btn" onclick="calculateGPA2()">Calculate Marks</button>
            <button class="switch-btn" onclick="switchPage()">Switch to Original</button>
            <button class="reset-btn" onclick="resetForm('page2')">Reset</button>
            <button class="theme-btn" onclick="toggleTheme()">Dark Mode</button>
            <button class="export-btn" onclick="exportHistory('history2')">Export History</button>
            <button class="share-btn" onclick="shareResult('result2')">Share Result</button>
            <button class="save-btn" onclick="saveCalculation('page2')">Save Calculation</button>
            <button class="view-saved-btn" onclick="viewSavedCalculations()">View Saved</button>
        </div>
        <div class="result-box" id="result2"></div>
        <div class="history" id="history2"></div>
    </div>

    <script>
        let history1 = [], history2 = [];
        let isDarkMode = false;

        function validateInput(input, max) {
            const value = parseFloat(input.value) || 0;
            const errorDiv = document.getElementById(`${input.id}-error`);
            if (value < 0) {
                input.classList.remove('valid');
                input.classList.add('invalid');
                errorDiv.textContent = 'Marks cannot be negative';
            } else if (value > max) {
                input.classList.remove('valid');
                input.classList.add('invalid');
                errorDiv.textContent = `Marks cannot exceed ${max}`;
            } else {
                input.classList.remove('invalid');
                input.classList.add('valid');
                errorDiv.textContent = '';
            }
        }

        function calculateGPA1() {
            let sscTotal = parseFloat(document.getElementById("sscTotal1").value) || 0;
            let ssc4th = parseFloat(document.getElementById("ssc4th1").value) || 0;
            let cpeMarks = parseFloat(document.getElementById("cpeMarks1").value) || 150;
            let hscTotal = parseFloat(document.getElementById("hscTotal1").value) || 0;
            let hsc4th = parseFloat(document.getElementById("hsc4th1").value) || 0;

            if (sscTotal > 1300 || ssc4th > 100 || cpeMarks > 150 || hscTotal > 1300 || hsc4th > 200) {
                document.getElementById("result1").innerHTML = "Error: Marks exceed maximum limits!";
                return;
            }

            let sscMarks = sscTotal - cpeMarks - ssc4th;
            let hscMarks = hscTotal - hsc4th;
            let sscGPA = (sscMarks / 1050) * 25;
            let hscGPA = (hscMarks / 1100) * 25;
            let totalGPA = sscGPA + hscGPA;

            document.getElementById("result1").innerHTML = `
                Total GPA Marks: <span>${totalGPA.toFixed(2)}</span>
                <div class="summary">SSC Contribution: ${sscGPA.toFixed(2)}, HSC Contribution: ${hscGPA.toFixed(2)}</div>
            `;
            history1.unshift(`SSC: ${sscMarks}/1050, HSC: ${hscMarks}/1100, GPA: ${totalGPA.toFixed(2)}`);
            updateHistory("history1", history1);
        }

        function calculateGPA2() {
            let sscTotal = parseFloat(document.getElementById("sscTotal2").value) || 0;
            let hscTotal = parseFloat(document.getElementById("hscTotal2").value) || 0;

            if (sscTotal > 1050 || hscTotal > 1100) {
                document.getElementById("result2").innerHTML = "Error: Marks exceed maximum limits!";
                return;
            }

            let sscGPA = (sscTotal / 1050) * 25;
            let hscGPA = (hscTotal / 1100) * 25;
            let totalGPA = sscGPA + hscGPA;

            document.getElementById("result2").innerHTML = `
                Total GPA Marks: <span>${totalGPA.toFixed(2)}</span>
                <div class="summary">SSC Contribution: ${sscGPA.toFixed(2)}, HSC Contribution: ${hscGPA.toFixed(2)}</div>
            `;
            history2.unshift(`SSC: ${sscTotal}/1050, HSC: ${hscTotal}/1100, GPA: ${totalGPA.toFixed(2)}`);
            updateHistory("history2", history2);
        }

        function updateHistory(elementId, historyArray) {
            const historyDiv = document.getElementById(elementId);
            historyDiv.innerHTML = "<h4>History</h4>" + historyArray.slice(0, 5).map(item => `<p>${item}</p>`).join("");
        }

        function switchPage() {
            const page1 = document.getElementById("page1");
            const page2 = document.getElementById("page2");
            page1.style.display = page1.style.display === "none" ? "block" : "none";
            page2.style.display = page2.style.display === "none" ? "block" : "none";
        }

        function resetForm(pageId) {
            const inputs = document.querySelectorAll(`#${pageId} input`);
            inputs.forEach(input => {
                input.value = "";
                input.classList.remove('valid', 'invalid');
                document.getElementById(`${input.id}-error`).textContent = '';
            });
            document.getElementById(`result${pageId.slice(-1)}`).innerHTML = "";
        }

        function toggleTheme() {
            isDarkMode = !isDarkMode;
            document.body.classList.toggle("dark-mode");
            const themeButtons = document.querySelectorAll(".theme-btn");
            themeButtons.forEach(btn => {
                btn.innerText = isDarkMode ? "Light Mode" : "Dark Mode";
            });
        }

        function exportHistory(historyId) {
            const historyArray = historyId === 'history1' ? history1 : history2;
            if (historyArray.length === 0) {
                alert('No history to export!');
                return;
            }
            const text = historyArray.join('\n');
            const blob = new Blob([text], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `${historyId}_gpa_history.txt`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function shareResult(resultId) {
            const resultBox = document.getElementById(resultId);
            if (!resultBox.textContent) {
                alert('No result to share!');
                return;
            }
            const text = resultBox.textContent.replace(/\n/g, ' ').trim();
            navigator.clipboard.writeText(text).then(() => {
                alert('Result copied to clipboard!');
            }).catch(() => {
                alert('Failed to copy result!');
            });
        }

        function saveCalculation(pageId) {
            const resultBox = document.getElementById(`result${pageId.slice(-1)}`);
            if (!resultBox.textContent) {
                alert('No result to save!');
                return;
            }
            const savedCalculations = JSON.parse(localStorage.getItem('savedCalculations') || '[]');
            const resultText = resultBox.textContent.replace(/\n/g, ' ').trim();
            savedCalculations.push({
                page: pageId,
                result: resultText,
                timestamp: new Date().toISOString()
            });
            localStorage.setItem('savedCalculations', JSON.stringify(savedCalculations));
            alert('Calculation saved!');
        }

        function viewSavedCalculations() {
            const savedCalculations = JSON.parse(localStorage.getItem('savedCalculations') || '[]');
            if (savedCalculations.length === 0) {
                alert('No saved calculations found!');
                return;
            }
            const historyDiv = document.getElementById('history1').style.display !== 'none' ? document.getElementById('history1') : document.getElementById('history2');
            historyDiv.innerHTML = "<h4>Saved Calculations</h4>" + 
                savedCalculations.slice(0, 5).map(item => `<p>${item.page.toUpperCase()} - ${item.result} (Saved: ${new Date(item.timestamp).toLocaleString()})</p>`).join("");
        }

        document.querySelectorAll("input").forEach(input => {
            input.addEventListener("input", function() {
                if (this.value < 0) this.value = 0;
            });
        });

        console.log('Script loaded, calculateGPA1 defined:', typeof calculateGPA1 === 'function');
    </script>
</body>
</html>
